<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空订票 - 注册</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✈️ 航空订票</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="auth-page">
    <div class="auth-form">
      <h2>注册</h2>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码（至少6位）">
      </div>
      <div class="form-group">
        <label>真实姓名</label>
        <input type="text" id="realName" placeholder="请输入姓名">
      </div>
      <div class="form-group">
        <label>邮箱</label>
        <input type="email" id="email" placeholder="请输入邮箱">
      </div>
      <div class="form-group">
        <label>手机号</label>
        <input type="text" id="phone" placeholder="请输入手机号">
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">注册</button>
      <div class="alt-link">
        已有账号？<a href="/login.html">立即登录</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getUser()) window.location.href = '/';

    async function doRegister() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const realName = document.getElementById('realName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      if (!username || !password) return showToast('用户名和密码不能为空', 'error');
      if (password.length < 6) return showToast('密码至少6位', 'error');
      try {
        const res = await API.register({ username, password, realName, email, phone });
        localStorage.setItem('token', res.token);
        localStorage.setItem('user', JSON.stringify(res.user));
        showToast('注册成功');
        setTimeout(() => window.location.href = '/', 800);
      } catch (e) {
        showToast(e.message, 'error');
      }
    }
  </script>
</body>
</html>
