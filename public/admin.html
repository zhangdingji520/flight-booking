<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空订票 - 管理后台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✈️ 航空订票</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <h2 style="margin-bottom:20px">管理后台</h2>
    <div class="stats-grid" id="stats">加载中...</div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('flights')">航班管理</button>
      <button class="tab-btn" onclick="switchTab('users')">用户管理</button>
      <button class="tab-btn" onclick="switchTab('orders')">订单管理</button>
    </div>

    <!-- Flights tab -->
    <div class="tab-content active" id="tab-flights">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3>航班列表</h3>
        <button class="btn btn-primary btn-sm" onclick="showFlightModal()">+ 添加航班</button>
      </div>
      <div class="table-wrap">
        <table id="flights-table">
          <thead>
            <tr>
              <th>航班号</th><th>航空公司</th><th>出发</th><th>到达</th>
              <th>出发时间</th><th>到达时间</th><th>价格</th><th>余票</th><th>状态</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="flights-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users tab -->
    <div class="tab-content" id="tab-users">
      <h3 style="margin-bottom:16px">用户列表</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>用户名</th><th>姓名</th><th>邮箱</th><th>手机</th><th>角色</th><th>注册时间</th><th>操作</th></tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders tab -->
    <div class="tab-content" id="tab-orders">
      <h3 style="margin-bottom:16px">订单列表</h3>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>订单号</th><th>用户</th><th>航班</th><th>航线</th><th>乘客</th><th>总价</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
          </thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Flight add/edit modal -->
  <div class="modal-overlay" id="flight-modal">
    <div class="modal">
      <h3 id="flight-modal-title">添加航班</h3>
      <input type="hidden" id="f-edit-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>航班号</label><input id="f-flightNo"></div>
        <div class="form-group"><label>航空公司</label><input id="f-airline"></div>
        <div class="form-group"><label>出发城市</label><input id="f-departure"></div>
        <div class="form-group"><label>到达城市</label><input id="f-arrival"></div>
        <div class="form-group"><label>出发时间</label><input type="datetime-local" id="f-departureTime"></div>
        <div class="form-group"><label>到达时间</label><input type="datetime-local" id="f-arrivalTime"></div>
        <div class="form-group"><label>票价</label><input type="number" id="f-price"></div>
        <div class="form-group"><label>总座位数</label><input type="number" id="f-totalSeats"></div>
        <div class="form-group"><label>机型</label><input id="f-aircraft"></div>
        <div class="form-group"><label>状态</label>
          <select id="f-status">
            <option value="on-time">准点</option>
            <option value="delayed">延误</option>
            <option value="cancelled">取消</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeFlightModal()">取消</button>
        <button class="btn btn-primary" onclick="saveFlight()">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const currentUser = checkAuth();
    if (currentUser.role !== 'admin') {
      showToast('需要管理员权限', 'error');
      setTimeout(() => window.location.href = '/', 1000);
    }

    // Stats
    async function loadStats() {
      try {
        const s = await API.getAdminStats();
        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="stat-value">${s.totalUsers}</div><div class="stat-label">注册用户</div></div>
          <div class="stat-card"><div class="stat-value">${s.totalFlights}</div><div class="stat-label">航班数</div></div>
          <div class="stat-card"><div class="stat-value">${s.totalOrders}</div><div class="stat-label">总订单</div></div>
          <div class="stat-card"><div class="stat-value">¥${s.totalRevenue.toLocaleString()}</div><div class="stat-label">总收入</div></div>
        `;
      } catch (e) { showToast(e.message, 'error'); }
    }

    // Tabs
    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // Flights
    async function loadFlights() {
      try {
        const flights = await API.getAdminFlights();
        const statusMap = { 'on-time': ['准点', 'badge-success'], delayed: ['延误', 'badge-warning'], cancelled: ['取消', 'badge-danger'] };
        document.getElementById('flights-body').innerHTML = flights.map(f => `
          <tr>
            <td><strong>${f.flightNo}</strong></td>
            <td>${f.airline}</td>
            <td>${f.departure}</td>
            <td>${f.arrival}</td>
            <td>${f.departureTime.replace('T', ' ')}</td>
            <td>${f.arrivalTime.replace('T', ' ')}</td>
            <td style="color:var(--danger);font-weight:600">¥${f.price}</td>
            <td>${f.availableSeats}/${f.totalSeats}</td>
            <td><span class="badge ${(statusMap[f.status] || ['',''])[1]}">${(statusMap[f.status] || [f.status])[0]}</span></td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editFlight(${JSON.stringify(f).replace(/"/g, '&quot;')})">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteFlight('${f.id}')">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (e) { showToast(e.message, 'error'); }
    }

    function showFlightModal(flight) {
      document.getElementById('flight-modal-title').textContent = flight ? '编辑航班' : '添加航班';
      document.getElementById('f-edit-id').value = flight ? flight.id : '';
      if (flight) {
        document.getElementById('f-flightNo').value = flight.flightNo;
        document.getElementById('f-airline').value = flight.airline;
        document.getElementById('f-departure').value = flight.departure;
        document.getElementById('f-arrival').value = flight.arrival;
        document.getElementById('f-departureTime').value = flight.departureTime.replace(' ', 'T');
        document.getElementById('f-arrivalTime').value = flight.arrivalTime.replace(' ', 'T');
        document.getElementById('f-price').value = flight.price;
        document.getElementById('f-totalSeats').value = flight.totalSeats;
        document.getElementById('f-aircraft').value = flight.aircraft;
        document.getElementById('f-status').value = flight.status;
      } else {
        ['f-flightNo','f-airline','f-departure','f-arrival','f-price','f-totalSeats','f-aircraft'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-status').value = 'on-time';
      }
      document.getElementById('flight-modal').classList.add('active');
    }

    function editFlight(flight) { showFlightModal(flight); }
    function closeFlightModal() { document.getElementById('flight-modal').classList.remove('active'); }

    async function saveFlight() {
      const id = document.getElementById('f-edit-id').value;
      const body = {
        flightNo: document.getElementById('f-flightNo').value.trim(),
        airline: document.getElementById('f-airline').value.trim(),
        departure: document.getElementById('f-departure').value.trim(),
        arrival: document.getElementById('f-arrival').value.trim(),
        departureTime: document.getElementById('f-departureTime').value.replace('T', ' '),
        arrivalTime: document.getElementById('f-arrivalTime').value.replace('T', ' '),
        price: parseInt(document.getElementById('f-price').value),
        totalSeats: parseInt(document.getElementById('f-totalSeats').value),
        aircraft: document.getElementById('f-aircraft').value.trim(),
        status: document.getElementById('f-status').value
      };
      try {
        if (id) {
          await API.updateFlight(id, body);
        } else {
          await API.addFlight(body);
        }
        showToast('保存成功');
        closeFlightModal();
        loadFlights();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function deleteFlight(id) {
      if (!confirm('确定要删除该航班吗？')) return;
      try {
        await API.deleteFlight(id);
        showToast('删除成功');
        loadFlights();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // Users
    async function loadUsers() {
      try {
        const users = await API.getAdminUsers();
        document.getElementById('users-body').innerHTML = users.map(u => `
          <tr>
            <td><strong>${u.username}</strong></td>
            <td>${u.realName}</td>
            <td>${u.email || '-'}</td>
            <td>${u.phone || '-'}</td>
            <td><span class="badge ${u.role === 'admin' ? 'badge-info' : 'badge-success'}">${u.role === 'admin' ? '管理员' : '用户'}</span></td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
            <td>${u.role !== 'admin' ? `<button class="btn btn-danger btn-sm" onclick="deleteUser('${u.id}')">删除</button>` : '-'}</td>
          </tr>
        `).join('');
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function deleteUser(id) {
      if (!confirm('确定要删除该用户吗？')) return;
      try {
        await API.deleteUser(id);
        showToast('删除成功');
        loadUsers();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // Orders
    async function loadOrders() {
      try {
        const orders = await API.getAdminOrders();
        const statusMap = { paid: ['已支付', 'badge-success'], cancelled: ['已取消', 'badge-danger'], completed: ['已完成', 'badge-info'], refunded: ['已退款', 'badge-warning'] };
        document.getElementById('orders-body').innerHTML = orders.map(o => {
          const [st, cls] = statusMap[o.status] || [o.status, 'badge-info'];
          return `
            <tr>
              <td><strong>${o.id}</strong></td>
              <td>${o.username}</td>
              <td>${o.flightNo}</td>
              <td>${o.departure} → ${o.arrival}</td>
              <td>${o.passengers.map(p => p.name).join(', ')}</td>
              <td style="color:var(--danger);font-weight:600">¥${o.totalPrice}</td>
              <td><span class="badge ${cls}">${st}</span></td>
              <td>${new Date(o.createdAt).toLocaleString()}</td>
              <td>
                <select onchange="updateOrderStatus('${o.id}', this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid var(--gray-300)">
                  <option value="paid" ${o.status === 'paid' ? 'selected' : ''}>已支付</option>
                  <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>已完成</option>
                  <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>已取消</option>
                  <option value="refunded" ${o.status === 'refunded' ? 'selected' : ''}>已退款</option>
                </select>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) { showToast(e.message, 'error'); }
    }

    async function updateOrderStatus(id, status) {
      try {
        await API.updateOrderStatus(id, status);
        showToast('状态已更新');
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // Init
    loadStats();
    loadFlights();
    loadUsers();
    loadOrders();
  </script>
</body>
</html>
