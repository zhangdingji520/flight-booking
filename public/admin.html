<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空订票 - 管理后台</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✈️ 航空订票</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <h2 style="margin-bottom:20px">管理后台</h2>
    <div class="stats-grid" id="stats"><div class="loading-container"><div class="spinner"></div><span>加载中...</span></div></div>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('flights', this)">航班管理</button>
      <button class="tab-btn" onclick="switchTab('users', this)">用户管理</button>
      <button class="tab-btn" onclick="switchTab('orders', this)">订单管理</button>
    </div>

    <!-- Flights tab -->
    <div class="tab-content active" id="tab-flights">
      <div class="admin-search">
        <h3>航班列表</h3>
        <div style="display:flex;gap:8px">
          <input type="text" id="flight-search" placeholder="搜索航班号/城市..." oninput="filterFlights()">
          <button class="btn btn-primary btn-sm" onclick="showFlightModal()">+ 添加航班</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>航班号</th><th>航空公司</th><th>出发</th><th>到达</th>
              <th>出发时间</th><th>到达时间</th><th>飞行时长</th><th>价格</th><th>余票</th><th>状态</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="flights-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Users tab -->
    <div class="tab-content" id="tab-users">
      <div class="admin-search">
        <h3>用户列表</h3>
        <input type="text" id="user-search" placeholder="搜索用户名/姓名..." oninput="filterUsers()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>用户名</th><th>姓名</th><th>邮箱</th><th>手机</th><th>角色</th><th>注册时间</th><th>操作</th></tr>
          </thead>
          <tbody id="users-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders tab -->
    <div class="tab-content" id="tab-orders">
      <div class="admin-search">
        <h3>订单列表</h3>
        <input type="text" id="order-search" placeholder="搜索订单号/用户/航班..." oninput="filterOrders()">
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>订单号</th><th>用户</th><th>航班</th><th>航线</th><th>乘客</th><th>总价</th><th>状态</th><th>创建时间</th><th>操作</th></tr>
          </thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Flight modal -->
  <div class="modal-overlay" id="flight-modal">
    <div class="modal">
      <h3 id="flight-modal-title">添加航班</h3>
      <input type="hidden" id="f-edit-id">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label>航班号</label><input id="f-flightNo"></div>
        <div class="form-group"><label>航空公司</label><input id="f-airline"></div>
        <div class="form-group"><label>出发城市</label><input id="f-departure"></div>
        <div class="form-group"><label>到达城市</label><input id="f-arrival"></div>
        <div class="form-group"><label>出发时间</label><input type="datetime-local" id="f-departureTime"></div>
        <div class="form-group"><label>到达时间</label><input type="datetime-local" id="f-arrivalTime"></div>
        <div class="form-group"><label>票价</label><input type="number" id="f-price" step="0.01"></div>
        <div class="form-group"><label>总座位数</label><input type="number" id="f-totalSeats"></div>
        <div class="form-group"><label>机型</label><input id="f-aircraft"></div>
        <div class="form-group"><label>状态</label>
          <select id="f-status">
            <option value="on-time">准点</option>
            <option value="delayed">延误</option>
            <option value="cancelled">取消</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeFlightModal()">取消</button>
        <button class="btn btn-primary" id="save-flight-btn" onclick="saveFlight()">保存</button>
      </div>
    </div>
  </div>

  <!-- Status confirm modal -->
  <div class="modal-overlay" id="status-modal">
    <div class="modal">
      <h3>确认修改订单状态</h3>
      <p id="status-confirm-text" style="margin-bottom:16px"></p>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeStatusModal()">取消</button>
        <button class="btn btn-primary" id="confirm-status-btn" onclick="doUpdateStatus()">确认修改</button>
      </div>
    </div>
  </div>

  <!-- Refund approve modal -->
  <div class="modal-overlay" id="refund-modal">
    <div class="modal">
      <h3>退款审核</h3>
      <p id="refund-info" style="margin-bottom:12px"></p>
      <div id="refund-reason-display" style="padding:12px;background:var(--gray-100);border-radius:8px;margin-bottom:16px"></div>
      <div class="form-group" id="reject-reason-group" style="display:none">
        <label>拒绝原因</label>
        <input type="text" id="reject-reason" placeholder="请填写拒绝原因">
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeRefundModal()">取消</button>
        <button class="btn btn-danger" onclick="rejectRefund()">拒绝退款</button>
        <button class="btn btn-success" onclick="approveRefund()">同意退款</button>
      </div>
    </div>
  </div>

  <!-- User edit modal -->
  <div class="modal-overlay" id="user-modal">
    <div class="modal">
      <h3>编辑用户</h3>
      <input type="hidden" id="u-edit-id">
      <div class="form-group"><label>用户名</label><input id="u-username" disabled style="background:var(--gray-100)"></div>
      <div class="form-group"><label>真实姓名</label><input id="u-realName"></div>
      <div class="form-group"><label>邮箱</label><input id="u-email"></div>
      <div class="form-group"><label>手机号</label><input id="u-phone"></div>
      <div class="form-group"><label>角色</label>
        <select id="u-role"><option value="user">用户</option><option value="admin">管理员</option></select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeUserModal()">取消</button>
        <button class="btn btn-primary" id="save-user-btn" onclick="saveUser()">保存</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    const currentUser = checkAuth();
    if (currentUser.role !== 'admin') {
      showToast('需要管理员权限', 'error');
      setTimeout(() => window.location.href = '/', 1000);
    }

    let allFlights = [], allUsers = [], allOrders = [];
    let pendingStatusUpdate = null, pendingRefundOrder = null;

    async function loadStats() {
      try {
        const s = await API.getAdminStats();
        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="stat-value">${s.totalUsers}</div><div class="stat-label">注册用户</div></div>
          <div class="stat-card"><div class="stat-value">${s.totalFlights}</div><div class="stat-label">航班数</div></div>
          <div class="stat-card"><div class="stat-value">${s.totalOrders}</div><div class="stat-label">总订单</div></div>
          <div class="stat-card"><div class="stat-value">${fmtPrice(s.totalRevenue)}</div><div class="stat-label">总收入</div></div>
          ${s.pendingRefunds > 0 ? `<div class="stat-card"><div class="stat-value" style="color:var(--warning)">${s.pendingRefunds}</div><div class="stat-label">待审核退款</div></div>` : ''}
        `;
      } catch (e) { showToast(e.message, 'error'); }
    }

    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // === Flights ===
    async function loadFlights() {
      try {
        allFlights = await API.getAdminFlights();
        renderFlights(allFlights);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function renderFlights(flights) {
      const statusMap = { 'on-time': ['准点', 'badge-success'], delayed: ['延误', 'badge-warning'], cancelled: ['取消', 'badge-danger'] };
      document.getElementById('flights-body').innerHTML = flights.map(f => {
        const [st, cls] = statusMap[f.status] || [esc(f.status), 'badge-info'];
        const duration = fmtDuration(f.departureTime, f.arrivalTime);
        return `
          <tr>
            <td><strong>${esc(f.flightNo)}</strong></td>
            <td>${esc(f.airline)}</td>
            <td>${esc(f.departure)}</td>
            <td>${esc(f.arrival)}</td>
            <td>${esc(f.departureTime.replace('T', ' '))}</td>
            <td>${esc(f.arrivalTime.replace('T', ' '))}</td>
            <td><span class="flight-duration">${esc(duration)}</span></td>
            <td style="color:var(--danger);font-weight:600">${fmtPrice(f.price)}</td>
            <td><span class="${seatClass(f.availableSeats, f.totalSeats)}">${f.availableSeats}/${f.totalSeats}</span></td>
            <td><span class="badge ${cls}">${st}</span></td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editFlight('${esc(f.id)}')">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteFlight('${esc(f.id)}')">删除</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterFlights() {
      const q = document.getElementById('flight-search').value.trim().toLowerCase();
      if (!q) return renderFlights(allFlights);
      renderFlights(allFlights.filter(f =>
        f.flightNo.toLowerCase().includes(q) ||
        f.departure.includes(q) || f.arrival.includes(q) ||
        f.airline.includes(q)
      ));
    }

    function showFlightModal(flight) {
      document.getElementById('flight-modal-title').textContent = flight ? '编辑航班' : '添加航班';
      document.getElementById('f-edit-id').value = flight ? flight.id : '';
      if (flight) {
        document.getElementById('f-flightNo').value = flight.flightNo;
        document.getElementById('f-airline').value = flight.airline;
        document.getElementById('f-departure').value = flight.departure;
        document.getElementById('f-arrival').value = flight.arrival;
        document.getElementById('f-departureTime').value = flight.departureTime.replace(' ', 'T');
        document.getElementById('f-arrivalTime').value = flight.arrivalTime.replace(' ', 'T');
        document.getElementById('f-price').value = flight.price;
        document.getElementById('f-totalSeats').value = flight.totalSeats;
        document.getElementById('f-aircraft').value = flight.aircraft;
        document.getElementById('f-status').value = flight.status;
      } else {
        ['f-flightNo','f-airline','f-departure','f-arrival','f-price','f-totalSeats','f-aircraft'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('f-status').value = 'on-time';
      }
      document.getElementById('flight-modal').classList.add('active');
    }

    async function editFlight(id) {
      const flight = allFlights.find(f => f.id === id);
      if (flight) showFlightModal(flight);
    }

    function closeFlightModal() { document.getElementById('flight-modal').classList.remove('active'); }

    async function saveFlight() {
      const btn = document.getElementById('save-flight-btn');
      const id = document.getElementById('f-edit-id').value;
      const body = {
        flightNo: document.getElementById('f-flightNo').value.trim(),
        airline: document.getElementById('f-airline').value.trim(),
        departure: document.getElementById('f-departure').value.trim(),
        arrival: document.getElementById('f-arrival').value.trim(),
        departureTime: document.getElementById('f-departureTime').value.replace('T', ' '),
        arrivalTime: document.getElementById('f-arrivalTime').value.replace('T', ' '),
        price: parseFloat(document.getElementById('f-price').value),
        totalSeats: parseInt(document.getElementById('f-totalSeats').value),
        aircraft: document.getElementById('f-aircraft').value.trim(),
        status: document.getElementById('f-status').value
      };
      setBtnLoading(btn, true);
      try {
        if (id) await API.updateFlight(id, body);
        else await API.addFlight(body);
        showToast('保存成功');
        closeFlightModal();
        loadFlights();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
      finally { setBtnLoading(btn, false); }
    }

    async function deleteFlight(id) {
      try {
        const res = await API.request(`/admin/flights/${id}/orders-count`);
        const msg = res.count > 0
          ? `确定要删除该航班吗？\n\n该航班有 ${res.count} 个有效订单，删除后将自动取消并通知用户。`
          : '确定要删除该航班吗？';
        if (!confirm(msg)) return;
      } catch { if (!confirm('确定要删除该航班吗？')) return; }
      try {
        const res = await API.deleteFlight(id);
        showToast(res.message || '删除成功');
        loadFlights();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // === Users ===
    async function loadUsers() {
      try {
        allUsers = await API.getAdminUsers();
        renderUsers(allUsers);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function renderUsers(users) {
      document.getElementById('users-body').innerHTML = users.map(u => `
        <tr>
          <td><strong>${esc(u.username)}</strong></td>
          <td>${esc(u.realName)}</td>
          <td>${esc(u.email || '-')}</td>
          <td>${esc(u.phone || '-')}</td>
          <td><span class="badge ${u.role === 'admin' ? 'badge-info' : 'badge-success'}">${u.role === 'admin' ? '管理员' : '用户'}</span></td>
          <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          <td>${u.role !== 'admin' ? `<button class="btn btn-outline btn-sm" onclick="editUser('${esc(u.id)}')">编辑</button><button class="btn btn-danger btn-sm" onclick="deleteUser('${esc(u.id)}')">删除</button>` : '-'}</td>
        </tr>
      `).join('');
    }

    function filterUsers() {
      const q = document.getElementById('user-search').value.trim().toLowerCase();
      if (!q) return renderUsers(allUsers);
      renderUsers(allUsers.filter(u =>
        u.username.toLowerCase().includes(q) ||
        (u.realName && u.realName.toLowerCase().includes(q))
      ));
    }

    async function deleteUser(id) {
      if (!confirm('确定要删除该用户吗？')) return;
      try {
        await API.deleteUser(id);
        showToast('删除成功');
        loadUsers();
        loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }

    // === Orders ===
    async function loadOrders() {
      try {
        allOrders = await API.getAdminOrders();
        renderOrders(allOrders);
      } catch (e) { showToast(e.message, 'error'); }
    }

    function renderOrders(orders) {
      const statusMap = { paid: ['已支付', 'badge-success'], cancelled: ['已取消', 'badge-danger'], completed: ['已完成', 'badge-info'], refunded: ['已退款', 'badge-warning'], refund_pending: ['退款审核中', 'badge-warning'] };
      document.getElementById('orders-body').innerHTML = orders.map(o => {
        const [st, cls] = statusMap[o.status] || [esc(o.status), 'badge-info'];
        return `
          <tr>
            <td><strong>${esc(o.id)}</strong></td>
            <td>${esc(o.username)}</td>
            <td>${esc(o.flightNo)}</td>
            <td>${esc(o.departure)} → ${esc(o.arrival)}</td>
            <td>${o.passengers.map(p => esc(p.name)).join(', ')}</td>
            <td style="color:var(--danger);font-weight:600">${fmtPrice(o.totalPrice)}</td>
            <td><span class="badge ${cls}">${st}</span></td>
            <td>${new Date(o.createdAt).toLocaleString()}</td>
            <td>
              ${o.status === 'refund_pending' ? `<button class="btn btn-success btn-sm" onclick="showRefundApprove('${esc(o.id)}')">审核</button>` : `
              <select onchange="confirmStatusChange('${esc(o.id)}', '${esc(o.status)}', this.value)" style="padding:4px 8px;border-radius:4px;border:1px solid var(--gray-300)">
                <option value="paid" ${o.status === 'paid' ? 'selected' : ''}>已支付</option>
                <option value="completed" ${o.status === 'completed' ? 'selected' : ''}>已完成</option>
                <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>已取消</option>
                <option value="refunded" ${o.status === 'refunded' ? 'selected' : ''}>已退款</option>
              </select>`}
            </td>
          </tr>
        `;
      }).join('');
    }

    function filterOrders() {
      const q = document.getElementById('order-search').value.trim().toLowerCase();
      if (!q) return renderOrders(allOrders);
      renderOrders(allOrders.filter(o =>
        o.id.toLowerCase().includes(q) ||
        o.username.toLowerCase().includes(q) ||
        o.flightNo.toLowerCase().includes(q) ||
        o.departure.includes(q) || o.arrival.includes(q)
      ));
    }

    function confirmStatusChange(orderId, oldStatus, newStatus) {
      if (oldStatus === newStatus) return;
      const statusLabels = { paid: '已支付', completed: '已完成', cancelled: '已取消', refunded: '已退款' };
      document.getElementById('status-confirm-text').textContent =
        `确定将订单状态从「${statusLabels[oldStatus]}」修改为「${statusLabels[newStatus]}」吗？`;
      pendingStatusUpdate = { orderId, newStatus };
      document.getElementById('status-modal').classList.add('active');
    }

    function closeStatusModal() {
      document.getElementById('status-modal').classList.remove('active');
      pendingStatusUpdate = null;
      loadOrders();
    }

    async function doUpdateStatus() {
      if (!pendingStatusUpdate) return;
      const btn = document.getElementById('confirm-status-btn');
      setBtnLoading(btn, true);
      try {
        await API.updateOrderStatus(pendingStatusUpdate.orderId, pendingStatusUpdate.newStatus);
        showToast('状态已更新');
        document.getElementById('status-modal').classList.remove('active');
        pendingStatusUpdate = null;
        loadStats();
        loadOrders();
      } catch (e) {
        showToast(e.message, 'error');
      } finally {
        setBtnLoading(btn, false);
      }
    }

    document.getElementById('status-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeStatusModal();
    });

    // === User edit ===
    function editUser(id) {
      const u = allUsers.find(x => x.id === id);
      if (!u) return;
      document.getElementById('u-edit-id').value = u.id;
      document.getElementById('u-username').value = u.username;
      document.getElementById('u-realName').value = u.realName || '';
      document.getElementById('u-email').value = u.email || '';
      document.getElementById('u-phone').value = u.phone || '';
      document.getElementById('u-role').value = u.role;
      document.getElementById('user-modal').classList.add('active');
    }
    function closeUserModal() { document.getElementById('user-modal').classList.remove('active'); }
    async function saveUser() {
      const btn = document.getElementById('save-user-btn');
      const id = document.getElementById('u-edit-id').value;
      setBtnLoading(btn, true);
      try {
        await API.updateUser(id, {
          realName: document.getElementById('u-realName').value.trim(),
          email: document.getElementById('u-email').value.trim(),
          phone: document.getElementById('u-phone').value.trim(),
          role: document.getElementById('u-role').value
        });
        showToast('更新成功');
        closeUserModal();
        loadUsers();
      } catch (e) { showToast(e.message, 'error'); }
      finally { setBtnLoading(btn, false); }
    }
    document.getElementById('user-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeUserModal();
    });

    // === Refund approve ===
    function showRefundApprove(id) {
      const o = allOrders.find(x => x.id === id);
      if (!o) return;
      pendingRefundOrder = id;
      document.getElementById('refund-info').textContent = `订单 ${o.id} - ${o.username} - ${fmtPrice(o.totalPrice)}`;
      document.getElementById('refund-reason-display').innerHTML = `<strong>退款原因：</strong>${esc(o.refundReason || '未填写')}`;
      document.getElementById('reject-reason').value = '';
      document.getElementById('reject-reason-group').style.display = 'none';
      document.getElementById('refund-modal').classList.add('active');
    }
    function closeRefundModal() {
      document.getElementById('refund-modal').classList.remove('active');
      pendingRefundOrder = null;
    }
    async function approveRefund() {
      if (!pendingRefundOrder) return;
      try {
        await API.approveRefund(pendingRefundOrder, true);
        showToast('退款已通过');
        closeRefundModal();
        loadOrders(); loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }
    async function rejectRefund() {
      if (!pendingRefundOrder) return;
      const reason = document.getElementById('reject-reason').value.trim();
      if (!reason) {
        document.getElementById('reject-reason-group').style.display = 'block';
        document.getElementById('reject-reason').focus();
        return;
      }
      try {
        await API.approveRefund(pendingRefundOrder, false, reason);
        showToast('退款已拒绝');
        closeRefundModal();
        loadOrders(); loadStats();
      } catch (e) { showToast(e.message, 'error'); }
    }
    document.getElementById('refund-modal').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeRefundModal();
    });

    loadStats();
    loadFlights();
    loadUsers();
    loadOrders();
  </script>
</body>
</html>
