<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空订票 - 搜索航班</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✈️ 航空订票</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="container">
    <div class="card" style="margin-bottom:24px">
      <div style="display:grid;grid-template-columns:1fr auto 1fr 1fr auto;gap:12px;align-items:end">
        <div class="form-group">
          <label>出发城市</label>
          <select id="s-departure"><option value="">全部</option></select>
        </div>
        <div style="padding-bottom:2px">
          <button class="swap-btn" onclick="swapCities()" title="交换城市">⇄</button>
        </div>
        <div class="form-group">
          <label>到达城市</label>
          <select id="s-arrival"><option value="">全部</option></select>
        </div>
        <div class="form-group">
          <label>出发日期</label>
          <input type="date" id="s-date">
        </div>
        <button class="btn btn-primary" onclick="doSearch()" style="height:42px">搜索</button>
      </div>
    </div>

    <div class="result-header">
      <span class="result-count" id="result-count"></span>
      <select id="sort-select" onchange="doSearch()" style="padding:6px 12px;border-radius:6px;border:1px solid var(--gray-300)">
        <option value="">默认排序</option>
        <option value="price">按价格排序</option>
        <option value="time">按时间排序</option>
      </select>
    </div>

    <div id="flight-list">
      <div class="empty-state">
        <div class="icon">✈️</div>
        <p>选择出发地和目的地搜索航班</p>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    document.getElementById('s-date').value = new Date().toISOString().split('T')[0];

    API.getCities().then(cities => {
      ['s-departure', 's-arrival'].forEach(id => {
        const sel = document.getElementById(id);
        cities.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          sel.appendChild(opt);
        });
      });
      const params = new URLSearchParams(window.location.search);
      if (params.get('departure')) document.getElementById('s-departure').value = params.get('departure');
      if (params.get('arrival')) document.getElementById('s-arrival').value = params.get('arrival');
      if (params.get('date')) document.getElementById('s-date').value = params.get('date');
      if (params.has('departure') || params.has('arrival')) doSearch();
    }).catch(() => {});

    function swapCities() {
      const dep = document.getElementById('s-departure');
      const arr = document.getElementById('s-arrival');
      const tmp = dep.value;
      dep.value = arr.value;
      arr.value = tmp;
    }

    async function doSearch() {
      const departure = document.getElementById('s-departure').value;
      const arrival = document.getElementById('s-arrival').value;
      const date = document.getElementById('s-date').value;
      const sort = document.getElementById('sort-select').value;
      const list = document.getElementById('flight-list');
      showLoading(list);
      try {
        const flights = await API.searchFlights({ departure, arrival, date, sort });
        document.getElementById('result-count').textContent = `共找到 ${flights.length} 个航班`;
        if (!flights.length) {
          list.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>未找到符合条件的航班</p></div>';
          return;
        }
        list.innerHTML = flights.map(f => `
          <div class="flight-card">
            <div class="flight-info">
              <div class="flight-route">
                <span>${esc(f.departure)}</span>
                <span class="arrow">→</span>
                <span>${esc(f.arrival)}</span>
                <span class="flight-duration">${esc(fmtDuration(f.departureTime, f.arrivalTime))}</span>
              </div>
              <div class="flight-meta">
                <span>${esc(f.airline)} ${esc(f.flightNo)}</span>
                <span>${esc(f.departureTime.split(' ')[1])} - ${esc(f.arrivalTime.split(' ')[1])}</span>
                <span>${esc(f.aircraft)}</span>
                <span class="${seatClass(f.availableSeats, f.totalSeats)}">余票: ${f.availableSeats}${f.availableSeats <= Math.floor(f.totalSeats * 0.2) ? ' ⚠️' : ''}</span>
              </div>
            </div>
            <div class="flight-price">
              <div class="price">${fmtPrice(f.price)}</div>
              <div class="unit">每人</div>
              <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="bookFlight('${esc(f.id)}')">立即预订</button>
            </div>
          </div>
        `).join('');
      } catch (e) {
        showToast(e.message, 'error');
      }
    }

    function bookFlight(id) {
      const user = getUser();
      if (!user) {
        showToast('请先登录', 'error');
        setTimeout(() => window.location.href = '/login.html?redirect=' + encodeURIComponent('/booking.html?flightId=' + id), 1000);
        return;
      }
      window.location.href = `/booking.html?flightId=${encodeURIComponent(id)}`;
    }
  </script>
</body>
</html>
