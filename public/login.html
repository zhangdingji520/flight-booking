<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>航空订票 - 登录</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="logo">✈️ 航空订票</a>
    <div class="nav-links" id="nav-links"></div>
  </nav>

  <div class="auth-page">
    <div class="auth-form">
      <h2>登录</h2>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" placeholder="请输入密码">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">登录</button>
      <div class="alt-link">
        还没有账号？<a href="/register.html">立即注册</a>
      </div>
      <div style="margin-top:12px;text-align:center;font-size:13px;color:var(--gray-500)">
        管理员测试账号: admin / admin123
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (getUser()) window.location.href = '/';

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return showToast('请填写完整', 'error');
      try {
        const res = await API.login({ username, password });
        localStorage.setItem('token', res.token);
        localStorage.setItem('user', JSON.stringify(res.user));
        showToast('登录成功');
        setTimeout(() => window.location.href = '/', 800);
      } catch (e) {
        showToast(e.message, 'error');
      }
    }
  </script>
</body>
</html>
